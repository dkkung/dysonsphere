name: Deploy to GitHub Pages

# Builds the Astro docs site (website/) and deploys it to the project Pages URL
# (dkkung.github.io/dysonsphere). The site's generated inputs (API reference pages,
# chart specs, palette/config data) are REGENERATED here from the checked-out library
# before the Astro build, so the deployed docs can never drift from the code on main.
# The committed copies under website/public and website/src remain for local dev
# (`npm run dev` needs no Python) - regenerate them via website/scripts/gen_*.py when
# working on the site. site/base are passed here rather than baked into
# astro.config.mjs so local dev and preview keep serving at "/".

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Regenerate site inputs from the library
        # The same commands documented in website/CLAUDE.md; uv resolves the workspace
        # (dysonsphere + dysonsphere-biology, needed by the volcano example) on demand.
        run: |
          uv run --no-project --with griffe python website/scripts/gen_api.py
          uv run --with vega-datasets python website/scripts/gen_examples.py
          uv run python website/scripts/gen_palettes.py
          uv run python website/scripts/gen_config.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        env:
          DEPLOY_SITE: https://dkkung.github.io
          DEPLOY_BASE: /dysonsphere
        run: npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
