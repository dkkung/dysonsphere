name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync (workspace + dev deps)
        run: uv sync

      - name: Format
        run: uv run ruff format --check dysonsphere/ tests/ scripts/ dysonsphere-biology/

      - name: Lint
        run: uv run ruff check dysonsphere/ tests/ scripts/ dysonsphere-biology/

      - name: Type check
        run: uv run ty check .

      - name: Test
        run: uv run pytest tests/ dysonsphere-biology/tests/
